name: Flutter Multi-Platform CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install project dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze and Test
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter analyze
          flutter test test/

      - name: Build Android, Web and Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter build apk --release
          flutter build web --release
          flutter build linux --release

      - name: Build iOS and macOS
        if: matrix.os == 'macos-latest'
        run: |
          flutter build ios --release --no-codesign
          flutter build macos --release --no-codesign

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release